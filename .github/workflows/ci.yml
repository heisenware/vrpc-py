name: CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-adapter:
    name: Unit Tests (Adapter)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test against all supported modern Python versions
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run Adapter Tests
        run: pytest tests/adapter/test_adapter.py -v

  test-integration:
    name: Integration Tests (Agent/Client)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Ubuntu-latest runners come with Docker Compose pre-installed.
      # We just need to trigger the existing bash script.
      - name: Run Dockerized Integration Tests
        run: |
          cd tests/agent
          chmod +x test.sh
          ./test.sh
